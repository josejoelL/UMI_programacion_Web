<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

</head>
<body>
    <div class="dive">
    <h1>Captura de datos personales</h1>

     <h2>Ingresa los datos que se te solicitan:</h2>
    <br>
    <p>Mi primera encuesta</p>
    <HR>

   <form action="resultados.html" method="GET">

        <label for="edad">Edad:</label>

        <label for="ciudad">Ciudad donde vives:</label>
        <input type="text" id="ciudad" name="ciudad" value="Ciudad donde vives:" required><br><br>

        <label for="pv">Pasatiempo favorito:</label>
        <input type="text" id="pv" name="pv" value="Pasatiempo favorito" required><br><br>
        <input type="submit" value="Ingresamos datos!">
</form>
    </div>
</body>
</html>
